    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Convite de casamento</title>

        
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cookie&family=Forum&display=swap" rel="stylesheet">    <style>
            
            *{
                padding: 0%;
                margin: 0%;
            }
            body{
                    background-color: rgba(226, 197, 65, 0.452);
                    
            }

            input[type="text"],
            input[type="tel"],
            input[type="email"],
            input[type="number"] {
                padding: 0.5rem;
                margin-bottom: 1rem;
                border: 2px solid rgba(226, 197, 65, 0.452);
                border-radius: 10px;
                width: 75%;
                
            }
            input[type="submit"]{
                border: 2px solid rgba(226, 197, 65, 0.452);
                cursor: pointer;
                padding: 1rem 2rem ;
                border-radius: 10px;
                margin-bottom: 1rem;
                
            }


            .Centro{
                text-align: center;
                font-family: Cookie;
                font-size: clamp(3rem, 5vw, 6rem);
                margin-bottom: 1rem;
            }
            .info{
                font-family: Forum;
                font-size: clamp(1rem, 5vw, 3rem);
                display: block;
                margin-top: 0.5rem;
            }
            
            .box {
                background-color: aliceblue;
                
                border-radius: 25px;
                padding: 1rem;
                
                margin: 1rem ;
        
            }

            .botao{
                text-align: center  ;
                height: 2rem;
                margin-top: 2vw;
            }


            #confirm {
                border-radius: 35px;
                background-image: url(backgima.jpg);
                background-size: cover;
                background-repeat: no-repeat;
                
                padding: 2rem;

                margin: 1rem;
            }
            

        </style>

        

    </head>
    <body>

        <div id="confirm">

        <h1 class="Centro">Confirmação de presença</h1>
        
        <form action="" id="formulario">

        <label for="nome" class="info">Nome completo</label>
        <input type="text"  id="nome" name="Nome" placeholder="Nome Completo" required>

        

        <label for="telefone" class="info" >Número de telefone</label> 
        <input type="tel"  id="telefone" name="telefone" placeholder="Ex: 11 9XXXX-XXXX" required>

        

        <label for="email" class="info">Email</label>
        <input type="email"  id="email" name="email" placeholder="...@gmail.com" required>

        

        <label for="comparecer" class="info">Você irá comparecer ao evento ?</label> 
        <input type="radio" value="Sim" name="comparecer" required><label>Sim</label>
        <input type="radio" value="Não" name="comparecer"><label for="não">Não</label>
            
        </div>
        
        <div class="box">
            <label for="" class="info">Quantidade de adultos, incluindo Você</label>
            <input type="number" id="adultos" name="adultos" min="0" max="8" value="" required disabled>
            
            <label for="" class="info">Quantidade de crianças, (Acima de 3 anos)</label>
            <input type="number" id="criancas" name="criancas" value="" required disabled>
            
            <div class="botao">
            <input type="submit" id="enviar">
            
            </div>
            <br>
        </div>
        </form>
        <script>

            const radios = document.querySelectorAll('input[name="comparecer"]');
        const adultos = document.getElementById("adultos");
        const criancas = document.getElementById("criancas");
        radios.forEach(radio => {
        radio.addEventListener("change", function(){

            if(this.value === "Sim"){
                adultos.disabled = false;
                criancas.disabled = false;

                adultos.value = 1;
            } else{
                adultos.disabled = true;
                criancas.disabled = true;

                adultos.value = 0;
                criancas.value = 0;
            }

        });
    });

            document.getElementById("formulario").addEventListener("submit", async function(e){
            e.preventDefault();

            const comparecer = document.querySelector('input[name="comparecer"]:checked');


            const dados = {
            nome: document.getElementById("nome").value,
            email: document.getElementById("email").value,
            telefone: document.getElementById("telefone").value,
            adultos: Number(adultos.value),
            criancas: Number(criancas.value),
            comparecer: comparecer.value

        };
        await fetch("https://script.google.com/macros/s/AKfycbxPVFGTRsDOa4zLkW3ZhQeS_bGl8V0zTImvRAHYw1Y42wROrY8nnCPb0BjdMxp4sH2g3Q/exec", {
        method: "POST",
        body: JSON.stringify(dados)
    });
        console.log(dados);

        alert("Dados enviados!");
        });

        </script>
    </body>
    </html>
